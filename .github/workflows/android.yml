name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install dependencies
      run: npm install

    - name: Build web
      run: npm run build

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: 21

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Add Capacitor Android
      run: npx cap add android || true

    - name: Copy SAF Plugin
      run: |
        PLUGIN_DIR="android/app/src/main/java/app/lovable/e61fee5bc92f456f8684aa0b1a8db0a3/plugins"
        mkdir -p "$PLUGIN_DIR"
        cp android-plugins/SAFPlugin.java "$PLUGIN_DIR/"

    - name: Register SAF Plugin in MainActivity
      run: |
        MAIN_ACTIVITY="android/app/src/main/java/app/lovable/e61fee5bc92f456f8684aa0b1a8db0a3/MainActivity.java"
        echo "=== Original MainActivity ==="
        cat "$MAIN_ACTIVITY"
        
        # Write a complete MainActivity with the plugin registered
        cat > "$MAIN_ACTIVITY" << 'MAINEOF'
        package app.lovable.e61fee5bc92f456f8684aa0b1a8db0a3;

        import android.os.Bundle;
        import com.getcapacitor.BridgeActivity;
        import app.lovable.e61fee5bc92f456f8684aa0b1a8db0a3.plugins.SAFPlugin;

        public class MainActivity extends BridgeActivity {
            @Override
            public void onCreate(Bundle savedInstanceState) {
                registerPlugin(SAFPlugin.class);
                super.onCreate(savedInstanceState);
            }
        }
        MAINEOF
        
        # Remove leading whitespace from heredoc
        sed -i 's/^        //' "$MAIN_ACTIVITY"
        
        echo "=== Updated MainActivity ==="
        cat "$MAIN_ACTIVITY"

    - name: Add DocumentFile dependency
      run: |
        GRADLE_FILE="android/app/build.gradle"
        sed -i '/dependencies {/a\    implementation "androidx.documentfile:documentfile:1.0.1"' "$GRADLE_FILE"

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Build APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
